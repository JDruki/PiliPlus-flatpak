name: Build Flatpak Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream PiliPlus release tag, or latest
        required: true
        default: latest
      force:
        description: Rebuild even if this Flatpak release already exists
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: piliplus-flatpak-release
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      asset_name: ${{ steps.resolve.outputs.asset_name }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      reason: ${{ steps.resolve.outputs.reason }}

    steps:
      - name: Check out packaging repo
        uses: actions/checkout@v4

      - name: Resolve upstream release
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ github.event.inputs.tag || 'latest' }}
          FORCE_BUILD: ${{ github.event.inputs.force || 'false' }}
        run: |
          python3 scripts/check-upstream-release.py \
            --tag "$REQUESTED_TAG" \
            --packaging-repo "${{ github.repository }}" \
            --force "$FORCE_BUILD"

      - name: Write summary
        run: |
          {
            echo "### PiliPlus upstream check"
            echo ""
            echo "- Upstream tag: \`${{ steps.resolve.outputs.tag }}\`"
            echo "- Asset: \`${{ steps.resolve.outputs.asset_name }}\`"
            echo "- Packaging release: \`${{ steps.resolve.outputs.release_tag }}\`"
            echo "- Should build: \`${{ steps.resolve.outputs.should_build }}\`"
            echo "- Reason: ${{ steps.resolve.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out packaging repo
        uses: actions/checkout@v4

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Prepare Flatpak signing key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID_VAR: ${{ vars.FLATPAK_GPG_KEY_ID }}
          FLATPAK_GPG_KEY_ID_SECRET: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          FLATPAK_GPG_KEY_ID="${FLATPAK_GPG_KEY_ID_VAR:-$FLATPAK_GPG_KEY_ID_SECRET}"
          echo "FLATPAK_GPG_KEY_ID=$FLATPAK_GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "FLATPAK_GPG_HOMEDIR=$RUNNER_TEMP/gnupg" >> "$GITHUB_ENV"
          if [[ -z "$FLATPAK_GPG_PRIVATE_KEY" || -z "$FLATPAK_GPG_KEY_ID" ]]; then
            echo "Flatpak GPG signing is not configured; publishing an unsigned repository."
            exit 0
          fi
          install -d -m 700 "$RUNNER_TEMP/gnupg"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --export "$FLATPAK_GPG_KEY_ID" > "$RUNNER_TEMP/flatpak-public.gpg"

      - name: Build bundle
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FLATPAK_BASE_URL: ${{ steps.pages.outputs.base_url }}
          FLATPAK_REPO_URL: ${{ steps.pages.outputs.base_url }}/repo
          FLATPAK_GPG_PUBLIC_KEY: ${{ runner.temp }}/flatpak-public.gpg
        run: |
          if [[ ! -s "$FLATPAK_GPG_PUBLIC_KEY" ]]; then
            unset FLATPAK_GPG_KEY_ID FLATPAK_GPG_PUBLIC_KEY
          fi
          ./scripts/build-flatpak.sh "${{ needs.resolve.outputs.tag }}"

      - name: Read release metadata
        id: meta
        run: |
          . build/generated/release.env
          echo "bundle=$BUNDLE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PILIPLUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=$PILIPLUS_ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$PILIPLUS_ASSET_SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.bundle }}
          path: |
            dist/${{ steps.meta.outputs.bundle }}
            dist/${{ steps.meta.outputs.bundle }}.sha256

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Deploy Flatpak repository to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: PiliPlus ${{ needs.resolve.outputs.tag }} Flatpak
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          files: |
            dist/${{ steps.meta.outputs.bundle }}
            dist/${{ steps.meta.outputs.bundle }}.sha256
          body: |
            Flatpak bundle built from upstream PiliPlus release `${{ needs.resolve.outputs.tag }}`.

            Flatpak repository: ${{ steps.pages.outputs.base_url }}/piliplus.flatpakrepo
            Direct install ref: ${{ steps.pages.outputs.base_url }}/com.example.piliplus.flatpakref

            Upstream release: https://github.com/bggRGjQaUbCoE/PiliPlus/releases/tag/${{ needs.resolve.outputs.tag }}
            Upstream Linux asset: `${{ steps.meta.outputs.asset }}`
            Upstream asset SHA256: `${{ steps.meta.outputs.sha256 }}`
